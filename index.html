<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>红细胞压积采血量计算</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      background: #071122;
      color: #eaf2ff;
      padding: 24px;
    }
    .wrap { max-width: 980px; margin: 0 auto; }
    h1 { font-size: 24px; margin: 0 0 24px; font-weight: 800; }
    .card {
      background: #111b2d;
      border: 1px solid #26354f;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 12px 30px rgba(0,0,0,.28);
    }
    label { display: block; color: #a9bbd6; margin-bottom: 8px; font-weight: 700; }
    .controls { display: grid; grid-template-columns: 1fr 160px; gap: 12px; align-items: end; }
    input {
      width: 100%;
      height: 54px;
      border-radius: 14px;
      border: 1px solid #33435f;
      background: #050b1a;
      color: #fff;
      padding: 0 18px;
      font-size: 22px;
      outline: none;
    }
    button {
      height: 54px;
      border: 0;
      border-radius: 14px;
      background: #3b82f6;
      color: #fff;
      font-size: 20px;
      font-weight: 800;
      cursor: pointer;
    }
    .hint { margin: 10px 0 18px; color: #8ea2c2; font-size: 14px; }
    .error { margin: 8px 0 18px; color: #fca5a5; font-weight: 700; display: none; }
    table { width: 100%; border-collapse: collapse; overflow: hidden; border-radius: 14px; }
    thead th {
      background: #202b3d;
      color: #dce8fb;
      text-align: left;
      padding: 14px 18px;
      font-size: 16px;
    }
    tbody td {
      border-top: 1px solid #223049;
      padding: 14px 18px;
      font-size: 18px;
      font-weight: 700;
    }
    tbody td:last-child { text-align: right; font-variant-numeric: tabular-nums; }
    .note {
      margin-top: 22px;
      padding: 18px 20px;
      border-radius: 16px;
      background: #fff7cc;
      border: 2px solid #f59e0b;
      color: #422006;
    }
    .note-title { font-size: 20px; font-weight: 900; margin-bottom: 10px; color: #9a3412; }
    .note ol { margin: 0; padding-left: 22px; }
    .note li { margin: 8px 0; font-size: 16px; line-height: 1.55; font-weight: 700; }
    .formula { color: #b91c1c; font-weight: 900; }
    @media (max-width: 640px) {
      body { padding: 16px; }
      h1 { font-size: 19px; }
      .card { padding: 16px; }
      .controls { grid-template-columns: 1fr; }
      button { width: 100%; }
      tbody td, thead th { padding: 13px 12px; font-size: 16px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>请输入红细胞压积（HCT）→ 查询各检查项目需要的血量</h1>
    <section class="card">
      <div class="controls">
        <div>
          <label for="hct">请输入红细胞压积</label>
          <input id="hct" type="number" inputmode="decimal" step="0.01" min="0" max="0.95" value="0.30" placeholder="例如：0.30" />
        </div>
        <button id="calcBtn" type="button">查询</button>
      </div>
      <div class="hint">请输入 0 到 0.95 之间的红细胞压积，例如 0.30。</div>
      <div id="error" class="error">请输入有效的红细胞压积，范围为 0 到 0.95。</div>

      <table aria-label="各检查项目需要的血量">
        <thead>
          <tr>
            <th>项目</th>
            <th>需要的血量</th>
          </tr>
        </thead>
        <tbody id="resultBody"></tbody>
      </table>

      <section class="note" aria-label="重要备注">
        <div class="note-title">⚠ 重要备注</div>
        <ol>
          <li>需同时多管采血时，不同管采血量需相加。</li>
          <li>如有血清管：<span class="formula">血量 = 所有管相加后血量 -（血清管 - 1）× 0.1</span>。</li>
          <li>如有疑问请与医生再次核对。</li>
        </ol>
      </section>
    </section>
  </main>

  <script>
    const items = [
      { name: "肝功", numerator: 0.2, extra: 0.1 },
      { name: "生化全套", numerator: 0.32, extra: 0.1 },
      { name: "血脂", numerator: 0.18, extra: 0.1 },
      { name: "肾功", numerator: 0.16, extra: 0 },
      { name: "电解质+血糖", numerator: 0.16, extra: 0.1 },
      { name: "血浆氨", numerator: 0.16, extra: 0.1 },
      { name: "甲功三项", numerator: 0.3, extra: 0.1 },
      { name: "急诊乳酸", numerator: 0.15, extra: 0.1 },
      { name: "TRUST滴度+TP", numerator: 0.3, extra: 0.1 },
      { name: "乙肝二对半", numerator: 0.45, extra: 0.1 },
      { name: "乙肝二对半HCV,HIV,TP,TRUST", numerator: 0.7, extra: 0.1 },
      { name: "细胞因子（7项/12项）", numerator: 0.1, extra: 0.1 },
      { name: "自身免疫（ANA+抗核抗体谱16项）", numerator: 0.15, extra: 0.1 },
      { name: "白介素6", numerator: 0.15, extra: 0.1 }
    ];

    const hctInput = document.getElementById("hct");
    const calcBtn = document.getElementById("calcBtn");
    const resultBody = document.getElementById("resultBody");
    const errorBox = document.getElementById("error");

    function formatNumber(value) {
      return Number(value.toFixed(9)).toString();
    }

    function calculate() {
      const hct = Number(hctInput.value);
      const valid = Number.isFinite(hct) && hct >= 0 && hct < 0.95;
      errorBox.style.display = valid ? "none" : "block";
      if (!valid) return;

      resultBody.innerHTML = items.map(item => {
        const volume = item.numerator / (1 - hct) + item.extra;
        return `<tr><td>${item.name}</td><td>${formatNumber(volume)}</td></tr>`;
      }).join("");
    }

    calcBtn.addEventListener("click", calculate);
    hctInput.addEventListener("keydown", event => {
      if (event.key === "Enter") calculate();
    });
    calculate();
  </script>
<script>window.parent.postMessage({ action: "ready" }, "*"); 
 
window.console = new Proxy(console, {
  get(target, prop) {
    if (['log', 'warn', 'error'].includes(prop)) {
      return new Proxy(target[prop], {
        apply(fn, thisArg, args) {
          fn.apply(thisArg, args);
          window.parent.postMessage({ action: 'console', 
            type: prop, 
            args: args.map((arg) => {
              try {
                return JSON.stringify(arg).replace(/^["']|["']$/g, '');
              } catch (e) {
                return arg;
              }
            }) 
          }, '*');
        }
      });
    }
    return target[prop];
  }
});
</script></body>
</html>
